app:
  name: pm_flow_intel
  environment: local
  log_level: INFO
  # log_file: reports/logs/pmfi.log   # Uncomment to enable rotating file logging
  #   Writes to a RotatingFileHandler (5 MB per file, 3 backups, UTF-8).
  #   Parent directory is created automatically on first use.
  #   Tail the log in PowerShell: Get-Content -Wait -Tail 50 reports\logs\pmfi.log

  # DEPRECATED: use features.enable_polymarket_live / features.enable_kalshi_live instead.
  # Setting this true will log a deprecation warning and has no additional effect.
  # live_mode_enabled: false

database:
  # url_env is NOT read by config.py. Set the DATABASE_URL environment variable
  # directly, or set the database.url key below with a literal connection string.
  # url_env: DATABASE_URL   <-- ignored; kept here only as a documentation hint
  schema: pmfi
  pool_min_size: 1
  pool_max_size: 10

ingestion:
  raw_retention_days: 90
  live_api_timeout_seconds: 10
  # Polymarket WS silence watchdogs. If a subscription yields no first frame or
  # an open socket goes quiet for too long, ingest restarts instead of looking healthy.
  polymarket_subscription_timeout_seconds: 30.0
  polymarket_receive_timeout_seconds: 60.0
  # Circuit breaker: sustained adapter/connection failures stop the venue loop
  # and surface circuit_open in the heartbeat instead of retrying forever.
  circuit_breaker_failure_threshold: 10
  circuit_breaker_window_seconds: 300.0
  # Directional accumulators are bounded by active market count plus cold-market
  # TTL. Evicted markets cold-start their in-memory directional window if they
  # trade again, while persisted raw/trade data remains in Postgres.
  directional_accumulator_max_markets: 5000
  directional_accumulator_ttl_seconds: 3600.0
  # Kalshi REST polling interval in seconds (REST polling is the current supported path)
  kalshi_poll_interval_seconds: 5.0
  # Kalshi REST trades fetched per ticker per poll. 200 is one full Kalshi page;
  # use a larger value with kalshi_trade_poll_max_pages > 1 for hot tickers.
  kalshi_trade_poll_limit: 200
  kalshi_trade_poll_max_pages: 1
  reconnect:
    initial_backoff_seconds: 1
    max_backoff_seconds: 60
    jitter: true

features:
  # Live ingest — set true to enable. No API key required for either venue.
  enable_polymarket_live: false   # Polymarket WebSocket
  enable_kalshi_live: false       # Kalshi public REST polling (no API key needed)

  # Opt-in enrichment — fully implemented; disabled by default to avoid extra REST calls.
  enable_orderbook_reconstruction: false  # fetch orderbook snapshot per trade from Polymarket CLOB

  # NOT YET IMPLEMENTED — enabling these flags has no effect and will log a warning.
  enable_cross_venue_matching: false
  enable_wallet_intelligence: false
  enable_ml_scoring: false

alerts:
  # "file" writes dated JSONL to reports/alerts/ (durable, recommended for production use).
  # Change to "console" for ephemeral stdout-only output.
  default_delivery: file
  allowed_delivery_modes:
    - console
    - file
    - localhost_http_receiver
  suppression_window_seconds: 300

# baselines: periodic in-daemon recompute of market baselines.
# baselines:
#   recompute_enabled: true          # set false to disable in-daemon recompute entirely
#   recompute_interval_minutes: 1440 # how often to recompute (default: daily)
#   window_days: 30                  # lookback window passed to compute_and_store_baselines
#   min_samples: 10                  # minimum trade samples required per market

# health: thresholds used by 'pmfi health' for per-venue staleness warnings.
# health:
#   venue_stale_seconds: 600         # warn when a venue's last event is older than this (default: 600s / 10min)
