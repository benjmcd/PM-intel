version: alert_rules.v1
rules:
  large_trade_absolute_v1:
    enabled: true
    type: absolute_trade
    min_capital_at_risk_usd: 25000
    min_payout_notional_usd: 100000
    severity: medium

  market_relative_large_trade_v1:
    enabled: true
    type: market_percentile
    min_trade_size_percentile: 99.5
    min_capital_at_risk_usd: 5000
    severity: medium

  directional_cluster_v1:
    enabled: true
    type: directional_cluster
    window_seconds: 300
    min_trade_count: 3
    min_net_capital_at_risk_usd: 15000
    min_price_impact_cents: 2
    severity: high

  open_interest_shock_v1:
    enabled: true
    type: open_interest_relative
    min_open_interest_fraction: 0.03
    min_capital_at_risk_usd: 5000
    severity: high

  momentum_v1:
    enabled: true
    window_seconds: 900
    min_trades: 5
    min_net_capital_usd: 75000
    min_price_spread: 0.03
    severity: high
    description: "Sustained directional capital flow over 15-minute window"

  volume_spike_v1:
    enabled: true
    min_spike_multiplier: 5.0
    min_baseline_trades: 20
    severity: medium
    description: "Single trade volume >= 5x recent market average"

suppression:
  default_window_seconds: 300
  dedupe_fields:
    - venue_code
    - market_id
    - outcome_key
    - rule_id
