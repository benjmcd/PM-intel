  next_recommended_focus:
    id: operator_dashboard_review_ux
    summary: >-
      Backend capture, replay, review, and calibration evidence is now ahead of
      the analyst-facing surface, but the dashboard has materially caught up:
      it now exposes row-level latest-review metadata and alert/raw/trade
      lineage, the local dashboard can list and review alerts, and it now adds
      visible-cohort comparison, structured evidence facts, and a click-only
      aggregate validate-only volume-spike candidate replay panel with bounded
      row-level removed/added delta samples plus an explicit local calibration
      packet export path, dashboard packet browser, selected/all cross-packet
      comparison for the full candidate delta set, selected/all calibration
      review summaries, a separate local calibration decision-record handoff,
      read-only dashboard decision history, and a read-only cross-packet
      calibration review summary that can now be embedded into decision records.
      The headed/headless dashboard UX audit now covers lineage, comparison,
      evidence facts, aggregate calibration replay context, and bounded delta
      sample rows plus all/selected packet comparison, decision history, and
      dense calibration review summaries. The remaining dashboard gap is not
      row-level sample visibility, packet generation, single-packet inspection,
      packet comparison, selected packet review, decision history, or
      reviewed-vs-unmatched candidate readiness, generating independent packet
      windows, or sweeping candidate grids; it is now finding a rule shape that
      actually removes reviewed persisted noise without true-positive risk, then
      carrying a reviewed change-ready decision into an explicit config patch
      when evidence justifies it. A baseline-median candidate shape now gives a
      better evidence-producing next queue: threshold 1000 with median floor 20
      removes four reviewed noise rows and no reviewed true positives across
      the six sampled Kalshi windows, but it also removes 42 unmatched rows, so
      the next pass is packet review rather than config mutation. That review
      queue is now executable through calibration-review-queue and the dashboard
      packet browser, with unmatched replay-only rows explicitly marked as not
      persisted-alert-reviewable. The review queue now also emits market-cluster
      summaries before row-level detail; the real m20 packet smoke returned 10
      clusters, with the top four covering 31 of the 42 unresolved unmatched
      removals. The queue can now be narrowed by exact market-cluster key through
      --market-cluster, the dashboard Market cluster input, and the
      market_cluster API query parameter. Dashboard cluster rows also expose a
      Use action that fills the exact cluster key and reruns Queue all, avoiding
      manual key transcription during cluster review. Returned queue rows now
      carry that same canonical market_cluster key, and CLI/dashboard row
      details render it beside each raw-event row. The
      calibration-cluster-review command now writes ignored local
      calibration_cluster_review.v1 artifacts for one exact cluster, preserving
      full filtered rows, raw event IDs, cluster summary, explicit assessment,
      rationale, and persisted_alert_review=false without DB/config/live
      mutation. The command can now opt into --include-raw-events to embed
      read-only local Postgres raw_event_lookup.v1 evidence before writing the
      artifact; --include-raw-payload is a separate explicit full-payload flag,
      while the default packet-only path still does not require DB access. The
      calibration-cluster-review-summary command now compares the current queue
      clusters with local cluster-review artifacts and reports covered/uncovered
      counts, latest assessment, artifact name, missing raw-event counts,
      conservative candidate readiness blockers, advisory next-action counts,
      raw lookup payload-status counts, and side/outcome signals.
      The localhost dashboard now also exposes read-only
      /api/calibration-cluster-reviews list/load/coverage routes and a Cluster
      reviews panel that renders artifact safeguards, embedded raw-event lookup
      rows, compact raw lookup profiles, and candidate readiness/blocker/signal
      chips when present, and all/default or selected-packet coverage using the
      current market-cluster filter. Calibration decision records can now embed cluster coverage
      through --include-cluster-review-summary, and the dashboard decision
      history surfaces cluster covered/uncovered and assessment counts. The latest
      raw-lineage-backed m20-no decision smoke recorded covered=3, uncovered=0,
      assessment_counts.uncertain=3, candidate_readiness_counts.needs-more-evidence=3,
      mixed side/outcome signal counts=3, and still decision=needs-more-evidence.
      A later local ignored full-payload decision snapshot,
      m20-full-payload-review-state.json, recorded covered=3, uncovered=0,
      raw_lookup_payload_status.full-payload=3, candidate_next_action.classify-cluster=3,
      and still decision=needs-more-evidence.
      The current latest M20 cluster-review artifacts now classify all three
      full-payload clusters as true-positive-risk:
      m20-mex-true-positive-risk.json, m20-tie-true-positive-risk.json, and
      m20-kor-true-positive-risk.json. A local ignored no-change decision
      snapshot, m20-no-change-true-positive-risk.json, records covered=3,
      uncovered=0, assessment_counts.true-positive-risk=3,
      candidate_readiness_counts.blocked-true-positive-risk=3,
      candidate_next_action.narrow-rule-before-config-review=3, and
      decision=no-change for the median20/threshold1000 candidate shape.
      A capped multiplier sweep then showed median20/threshold1000/maxmult100
      is the most evidence-bearing next packet-review candidate: it removes
      four reviewed noise/false-positive rows and zero reviewed true positives,
      but still has 30 unmatched replay-only removals in the high-multiplier
      800_to_999 band, so it remains validate-only until packet review resolves
      that blast radius.
      The mx100 packet set and mx100.json decision artifact preserve that
      candidate for direct review. The MEX cluster is now covered by
      mx100-mex-risk.json and blocks the broad maxmult100 shape as
      true-positive-risk; mx100-mex-blocked.json records decision=no-change.
      Decision history now surfaces this as
      decision_readiness=blocked-by-cluster-true-positive-risk. A compact
      threshold/multiplier grid did not find a simple separable candidate, so
      TIE/KOR were reviewed next. They are full-payload uncertain real-trade
      clusters, not safe noise. The remaining mx100-rb and mx100-p800 clusters
      were then reviewed through full-payload raw lookup artifacts; the current
      mx100-expanded-covered-no-change.json decision records covered=8,
      uncovered=0, assessment_counts.true-positive-risk=1,
      assessment_counts.uncertain=7, and review_summary.recommendation=
      needs-more-evidence. Complete coverage strengthens the no-change posture:
      mx100 should be treated as rejected for production config unless a future
      candidate family finds a separable feature that removes reviewed noise
      without true-positive-risk or uncertain clean-trade suppression.
      The raw-events command now provides a read-only local Postgres lookup for
      raw event IDs, joined normalized trade facts, payload previews, and
      optional full raw payload JSON so packet/raw-event review no longer
      requires ad hoc SQL.
