- command: python scripts\task.py calibration-cluster-review-summary --packet m20-no.json --format text
  why: summarize covered and uncovered calibration packet market clusters from local cluster-review artifacts without DB writes, config changes, artifact writes, or live calls
advancement_policy:
  default: Work lower layers before higher layers when both are feasible.
  allowed_parallel_work: true
  allowed_top_down_spikes: true
  spike_payback_required: tests_or_schema_or_fixtures_or_interfaces_or_blocker
  never_bypass:
  - local_only_scope
  - no_trading_or_order_placement
  - raw_evidence_lineage
  - default_offline_verification
  - no_secret_commits
  - no_weakened_tests
  orthogonal_decisioning_for_unclear_work: true
  talmudic_style_debate_for_nontrivial_decisions: true
  anti_ceremony_material_results_over_process: true
  orthogonal_reasoning_allowed: true
  compact_decision_debate_required_for_unclear_architecture: true
  material_progress_over_ceremony: true
  decision_loop:
    when: unclear_architectural_or_organizational_or_orchestration_or_data_semantic_choice
    format: question_strongest_case_objection_orthogonal_alternative_consensus_payback_next_check
    max_default_length: short_enough_to_not_block_implementation
