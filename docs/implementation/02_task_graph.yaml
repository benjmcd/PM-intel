parallel_tracks:
- id: CLI_spike
  purpose: clarify local operator workflow without hiding network calls
  payback: tests and docs for resulting command contract
- id: fixture_contracts
  purpose: advance without live venue access
  payback: normalizer tests and source-map blocker notes
- id: sql_review
  purpose: harden Postgres schema before Docker is available
  payback: SQL tests or db verification when possible
- id: alert_payload_examples
  purpose: clarify utility and explainability
  payback: scoring tests and replay snapshots
- id: orthogonal_decision_spike
  purpose: resolve unclear architecture, organization, orchestration, or product-utility
    choices through orthogonal lenses and compact Talmudic debate
  payback: consensus action plus test/schema/fixture/interface/local command/report/blocker
decision_policy:
  unclear_work_mode: orthogonal_problem_solving
  non_trivial_decision_method: compact_talmudic_debate
