high_priority_commands:
- command: python scripts\verify.py
  why: canonical offline verification gate; no default live API calls
- command: python scripts\db_local.py up
  why: start local Docker/Postgres when DB-backed proof is needed
- command: python scripts\db_local.py init
  why: apply local schema and seed venues before first DB verification
- command: python scripts\db_local.py verify
  why: validate local Postgres schema and seeded venues after Docker is up
- command: python scripts\task.py review-pass
  why: run the local coherence/docs-drift gate without DB, live API, or artifact writes
- command: python -m pytest tests\test_replay_backtest_db.py -q
  why: DB-gated deterministic replay/persist proof when PMFI_DB_URL is set; skips in default offline verification
- command: python scripts\task.py db-replay --from <started_at> --to <ended_at> --limit 0 --report
  why: run exact-window DB replay/backtest proof with fail-closed timezone-aware bounds and write the local ignored replay report
- command: python scripts\task.py handoff --db-verify
  why: write a local-only handoff evidence snapshot with current DB readiness
- command: python scripts\task.py publish-ready --fetch
  why: validate clean branch ancestry and fresh remote-tracking evidence before any push or PR claim
- command: python scripts\task.py clean-checkout-smoke --install-dev --run-verify --db-verify
