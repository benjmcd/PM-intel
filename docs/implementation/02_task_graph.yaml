version: 2
execution_model: adaptive_bottom_up
primary_environment: windows_local_directory
primary_storage: postgres
required_default_gate: python scripts\verify.py
fast_advance_contract: FAST_ADVANCE.md
adaptive_map: docs/implementation/06_adaptive_milestone_map.md
current_posture:
  summary: implemented local core is handoff-ready with offline, fixture, DB-gated,
    and bounded live evidence; this is not final long-term completion.
  source_of_truth: WORKLOG.md plus current executable verification; this task graph
    is the status surface consumed by scripts/repo_status.py.
  constraints_intact:
  - local_only_scope
  - postgres_first_storage
  - raw_evidence_lineage_before_derived_records
  - no_trading_or_order_placement
  - default_tests_make_no_live_api_calls
  verified_proof:
  - Strict Polymarket live soak passed on 2026-06-18 with raw_events=11643,
    normalized_trades=781, alerts=10, unresolved_dead_letters=0,
    open_data_quality_incidents=0, raw_evidence_duration_minutes=68.9.
  - Strict Kalshi-required live soak passed on 2026-06-18 with kalshi raw_events=1144,
    kalshi normalized_trades=1144, kalshi raw_evidence_duration_minutes=60.862,
    unresolved_dead_letters=0, open_data_quality_incidents=0, and copied-ticker
    sync/watch proven through pmfi markets sync-one.
  - Tier-1 alert-quality review recorded 23 local Postgres review rows on 2026-06-18;
    reviewed volume_spike_v1 low_notional+thin_baseline alerts were labeled noise
    with category low_notional_thin_baseline.
  - Tier-1 review of the remaining market_relative_large_trade_v1 alert recorded
    one true-positive review row on 2026-06-18; the trade was the local maximum
    for its market window, above the post-window p99.5, with the sparse-baseline
    caveat retained in the review category.
  - volume_spike_v1 now has a configurable min_trade_usd=500 floor backed by reviewed
    noise evidence and fixture tests, suppressing sub-$500 spike-only alerts while
    preserving higher-notional spike detection.
  - Read-only 24h DB replay with current post-tuning rules processed 12797 raw
    events, produced 1935 normalized results and 30 in-memory alerts, and emitted
    zero volume_spike_v1 alerts below the configured 500 USD floor.
  - >-
    Publish-readiness validation passed after fetching origin on 2026-06-18:
    branch main was clean, ahead 52 and behind 0 against origin/main, with no
    attribution/generated-footer hits.
  - >-
    Publication completed on 2026-06-18: git push origin main succeeded, a fresh
    fetch confirmed local HEAD and origin/main matched, and the worktree was clean
    with no ahead/behind delta.
  - >-
    Fresh post-publication bounded live ingest passed on 2026-06-18 with raw_events=2021,
    normalized_trades=290, alerts=0, unresolved_dead_letters=0,
    open_data_quality_incidents=0, raw_evidence_duration_minutes=9.965, and
    both required venues present: kalshi raw_events=266 normalized_trades=266
    duration_minutes=8.804; polymarket raw_events=1755 normalized_trades=24
    duration_minutes=9.965.
  - >-
    Dashboard alert hardening now surfaces deterministic triage flags in the
    read-only /api/alerts payload and browser alerts table using the shared
    pmfi.alert_triage helper, aligning dashboard review context with pmfi alerts
    list and pmfi report.
  - >-
    Exact-run soak validation now supports explicit --since and --until bounds,
    fails closed for malformed, naive, future, or inverted timestamps, and routes
    through both pmfi soak and python scripts\task.py soak.
  - >-
    Fresh exact bounded current-traffic soak passed on 2026-06-18 for the
    completed run from 2026-06-18T12:45:04.533894+00:00 through
    2026-06-18T13:58:12+00:00 with raw_events=15711,
    normalized_trades=723, alerts=0, unresolved_dead_letters=0,
    open_data_quality_incidents=0, raw_evidence_duration_minutes=69.984, and
    both required venues present: kalshi raw_events=167 normalized_trades=167
    duration_minutes=69.939; polymarket raw_events=15544
    normalized_trades=556 duration_minutes=69.984.
  - >-
    Dashboard alert filtering is now read-only and operator-facing: /api/alerts
    accepts review_state, latest review_label, and repeated or comma-separated
    triage_flag filters, rejects invalid/conflicting filters with HTTP 400, and
    the browser dashboard exposes matching controls while GET filtering remains
    non-mutating and separate from the review POST path.
  - >-
    Dashboard alert review writes are implemented as a localhost-only append-only
    POST /api/alerts/{alert_id}/review path. It accepts label tp/fp/noise plus
    optional string category, notes, and reviewed_by fields, resolves full UUIDs
    or existing short alert prefixes through the shared alert repository helper,
    returns inserted review metadata, and leaves GET/read endpoints non-mutating.
  - >-
    Local dashboard review endpoint smoke passed against local Postgres on
    2026-06-18: malformed JSON returned HTTP 400, invalid labels returned HTTP
    400, missing alert IDs returned HTTP 404, a short-prefix POST inserted one
    append-only tp review row, and GET /api/alerts with reviewed/tp filters
    returned the inserted latest-review state before synthetic cleanup.
  - >-
    Headless and headed Chrome smoke passed on 2026-06-18 against the localhost
    dashboard review controls using the installed Chrome channel. Each browser
    submitted one synthetic unreviewed alert through the in-page review form,
    refreshed the row to its latest-review label/category, detected zero
    table-cell overlaps at a 1440x950 viewport, and synthetic alerts/markets
    were cleaned up afterward.
  - >-
    Dashboard review-write hardening now rejects non-application/json POSTs
    before DB access, rejects foreign Origin/Referer headers with HTTP 403,
    validates route-level 400/404/200 status mapping in default tests, and escapes
    quotes in dashboard-rendered review metadata to prevent attribute injection;
    headed/headless browser smoke preserved quoted review notes as inert text.
  - >-
    Dashboard-origin review cross-surface smoke passed on 2026-06-18: one
    synthetic alert was reviewed through the dashboard POST path, pmfi report
    surfaced the false-positive category, pmfi alerts fp-rate reported Reviewed=1
    and FP=1 for the unique rule, pmfi alerts list --reviewed --review-label fp
    returned the same alert/review truth, and synthetic rows were cleaned up.
  next_recommended_focus:
    id: review_packet_export
    summary: Add a local review-packet export for reviewed alert cohorts that
      bundles alert evidence summaries, latest review labels/categories, triage
      flags, and relevant report context into a handoff-friendly artifact for
      calibration and operator audit; keep authenticated Kalshi WebSocket work
      deferred unless credentials and signing are explicitly approved.
  residual_proof_gaps:
  - >-
    Live alert review queue is fully labeled in local Postgres for the current
    24h evidence window: 23 volume_spike_v1 noise rows and 1
    market_relative_large_trade_v1 true-positive row; this is local review truth,
    not publish or remote truth.
  - Publication is complete for current local commits; future local changes still
    need the publish-ready gate before another push.
  - Dashboard-origin review rows now have endpoint, browser, and cross-surface
    CLI/report proof, but there is not yet a compact local review-packet export
    for reviewed alert cohorts, calibration, and handoff audit.
  - Authenticated Kalshi WebSocket remains deferred; the supported Kalshi path is
    local REST polling unless future credentials and signing are approved.
high_priority_commands:
- command: python scripts\verify.py
  why: canonical offline verification gate; no default live API calls
- command: python scripts\db_local.py up
  why: start local Docker/Postgres when DB-backed proof is needed
- command: python scripts\db_local.py init
  why: apply local schema and seed venues before first DB verification
- command: python scripts\db_local.py verify
  why: validate local Postgres schema and seeded venues after Docker is up
- command: python scripts\task.py handoff --db-verify
  why: write a local-only handoff evidence snapshot with current DB readiness
- command: python scripts\task.py publish-ready --fetch
  why: validate clean branch ancestry and fresh remote-tracking evidence before any push or PR claim
- command: python scripts\task.py soak --window 2h
  why: validate persisted live-soak evidence by lookback window; use --required-venue with --min-required-venue-duration-minutes for strict venue proof
- command: python scripts\task.py soak --since <started_at> --until <ended_at>
  why: validate one exact bounded ingest run using explicit timestamps
- command: python scripts\task.py fixture-replay
  why: fixture-backed replay proof for raw-to-alert behavior
- command: python -m pmfi.cli health
  why: inspect local daemon heartbeat and stale/missing runtime state
- command: python -m pmfi.cli report --since 7d
  why: inspect local alert, review, and data-quality posture from Postgres
advancement_policy:
  default: Work lower layers before higher layers when both are feasible.
  allowed_parallel_work: true
  allowed_top_down_spikes: true
  spike_payback_required: tests_or_schema_or_fixtures_or_interfaces_or_blocker
  never_bypass:
  - local_only_scope
  - no_trading_or_order_placement
  - raw_evidence_lineage
  - default_offline_verification
  - no_secret_commits
  - no_weakened_tests
  orthogonal_decisioning_for_unclear_work: true
  talmudic_style_debate_for_nontrivial_decisions: true
  anti_ceremony_material_results_over_process: true
  orthogonal_reasoning_allowed: true
  compact_decision_debate_required_for_unclear_architecture: true
  material_progress_over_ceremony: true
  decision_loop:
    when: unclear_architectural_or_organizational_or_orchestration_or_data_semantic_choice
    format: question_strongest_case_objection_orthogonal_alternative_consensus_payback_next_check
    max_default_length: short_enough_to_not_block_implementation
milestones:
- id: M0
  name: repository verification baseline
  status: complete
  gate: python scripts\verify.py
  recommended_when: always before meaningful work
  unlocks:
  - M1
  - M2_fixture_contracts
  - CLI_spike
- id: M1
  name: local postgres proof
  status: core_proven
  gate: python scripts\db_local.py verify
  proof: Local Postgres schema and venue seed verification have passed in prior
    DB-gated runs; rerun when Docker/Postgres state changes.
  if_blocked: record Docker/Postgres blocker and advance fixture-backed repository
    contracts
  unlocks:
  - M2
- id: M2
  name: raw event persistence
  status: core_proven
  gate: raw fixture persistence test
  proof: Raw event persistence is implemented and covered by fixture/DB-backed
    replay paths; raw lineage remains a binding constraint.
  parallel_safe_without_live_feeds: true
  unlocks:
  - M3
  - M4_fixture_pipeline
- id: M3
  name: normalized trade contracts
  status: core_proven
  gate: python scripts\task.py fixture-replay
  proof: Normalization contracts are fixture-backed, with malformed payloads
    routed to dead-letter behavior instead of aborting the operator proof.
  parallel_safe_without_live_feeds: true
  unlocks:
  - M4
  - M6_basic_metrics
- id: M4
  name: fixture replay pipeline
  status: core_proven
  gate: python scripts\task.py fixture-replay
  proof: Fixture replay exercises the local raw-to-alert path without live calls.
  unlocks:
  - M6
  - CLI_spike
- id: M5
  name: opt-in live read adapters
  status: strict_polymarket_and_kalshi_soaks_proven
  gate: python scripts\task.py soak --window 2h
  proof: Strict Polymarket live soak passed on 2026-06-18 with raw_events=11643,
    normalized_trades=781, alerts=10, unresolved_dead_letters=0,
    open_data_quality_incidents=0, raw_evidence_duration_minutes=68.9; strict
    Kalshi-required soak passed on 2026-06-18 with kalshi raw_events=1144,
    kalshi normalized_trades=1144, kalshi raw_evidence_duration_minutes=60.862,
    unresolved_dead_letters=0, open_data_quality_incidents=0.
  if_blocked: improve source map, adapter interface, and fixture contracts
  unlocks:
  - live_data_quality
- id: M6
  name: rolling metrics
  status: core_proven
  gate: deterministic metric fixture tests
  proof: Rolling metric windows and baseline enrichment are covered by deterministic
    tests and DB-gated runs.
  unlocks:
  - M7
- id: M7
  name: explainable alert engine
  status: core_proven
  gate: fixture alert report
  proof: Explainable alert rules fire from fixture and replay paths with evidence
    payloads and degraded confidence handling.
  unlocks:
  - M8
  - M9
- id: M8
  name: local alert delivery
  status: core_proven
  gate: stdout/file delivery tests
  proof: Local stdout/file/localhost delivery surfaces are implemented and tested;
    external notification SaaS remains excluded.
  unlocks:
  - operator_workflow
- id: M9
  name: replay and backtesting
  status: core_proven
  gate: replay report under reports
  proof: Replay and backtest paths are implemented; generated reports are local
    artifacts, not publish-readiness claims.
  unlocks:
  - M10
- id: M10
  name: local hardening and operator UX
  status: continuous_hardening
  gate: python scripts\verify.py plus local ops smoke
  proof: Operator commands, health/reporting, fail-closed validation, and Windows
    UX have substantial evidence; continue hardening as live runtime evidence grows.
  unlocks: []
parallel_tracks:
- id: CLI_spike
  purpose: clarify local operator workflow without hiding network calls
  payback: tests and docs for resulting command contract
- id: fixture_contracts
  purpose: advance without live venue access
  payback: normalizer tests and source-map blocker notes
- id: sql_review
  purpose: harden Postgres schema before Docker is available
  payback: SQL tests or db verification when possible
- id: alert_payload_examples
  purpose: clarify utility and explainability
  payback: scoring tests and replay snapshots
- id: orthogonal_decision_spike
  purpose: resolve unclear architecture, organization, orchestration, or product-utility
    choices through orthogonal lenses and compact Talmudic debate
  payback: consensus action plus test/schema/fixture/interface/local command/report/blocker
decision_policy:
  unclear_work_mode: orthogonal_problem_solving
  non_trivial_decision_method: compact_talmudic_debate
  material_results_priority: true
  canonical_doc: docs/governance/12_decision_methods.md
  debate_output_required:
  - consensus_action
  - payback_artifact
  - next_check
  avoid:
  - low_velocity_ceremony
  - documentation_without_executable_progress
  - single_frame_architecture_decisions
