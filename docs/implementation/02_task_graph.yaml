high_priority_commands:
- command: python scripts\verify.py
  why: canonical offline verification gate; no default live API calls
- command: python scripts\db_local.py up
  why: start local Docker/Postgres when DB-backed proof is needed
- command: python scripts\db_local.py init
  why: apply local schema and seed venues before first DB verification
- command: python scripts\db_local.py verify
  why: validate local Postgres schema and seeded venues after Docker is up
- command: python scripts\task.py review-pass
  why: run the local coherence/docs-drift gate without DB, live API, or artifact writes
- command: python -m pytest tests\test_replay_backtest_db.py -q
  why: DB-gated deterministic replay/persist proof when PMFI_DB_URL is set; skips in default offline verification
- command: python scripts\task.py db-replay --from <started_at> --to <ended_at> --limit 0 --report
  why: run exact-window DB replay/backtest proof with fail-closed timezone-aware bounds and write the local ignored replay report
- command: python scripts\task.py handoff --db-verify
  why: write a local-only handoff evidence snapshot with current DB readiness
- command: python scripts\task.py publish-ready --fetch
  why: validate clean branch ancestry and fresh remote-tracking evidence before any push or PR claim
- command: python scripts\task.py soak --window 2h
  why: validate persisted live-soak evidence by lookback window; use --required-venue with --min-required-venue-duration-minutes for strict venue proof
- command: python scripts\task.py soak --since <started_at> --until <ended_at>
  why: validate one exact bounded ingest run using explicit timestamps
- command: python scripts\task.py fixture-replay
  why: fixture-backed replay proof for raw-to-alert behavior
- command: python scripts\task.py health
  why: inspect local daemon heartbeat and stale/missing runtime state
- command: python scripts\task.py report --since 7d
  why: inspect local alert, review, and data-quality posture from Postgres
- command: python scripts\task.py dead-letters --limit 20 --format json
  why: inspect recent normalization failures with full IDs and resolved status through the Windows task wrapper
- command: python scripts\task.py review-packet --since 24h
  why: export a local JSON packet for reviewed alert cohorts, calibration, and handoff audit
- command: python scripts\task.py outcome-audit --since <started_at> --until <ended_at> --strict
  why: exact-window read-only audit that proves or fails directional/momentum dominant_side persistence
- command: python scripts\task.py refresh-watchlist --since-minutes 30 --limit 50 --top 5 --sync --watch --replace-watch
  why: refresh active public Kalshi tickers into the local watchlist and unwatch stale local Kalshi markets before strict Kalshi live-soak proof
- command: pmfi ingest --max-seconds 600 --kalshi-poll-interval-seconds 1 --kalshi-trade-poll-limit 10000 --kalshi-trade-poll-max-pages 10 --log-file reports\logs\kalshi-per-ticker-proof.daemon.log
  why: run the current per-ticker overlap Kalshi REST capture proof without editing local config; limit is the total trade cap, so 10000 with max_pages=10 exercises up to ten 1000-trade pages before soak claims
- command: python scripts\task.py volume-spike-floor-audit --from <started_at> --to <ended_at> --limit 0 --venue kalshi --format json
  why: validate current configured volume_spike_v1 floor adherence through one-pass local DB replay; fails closed on empty runtime, no current spike alerts, below-floor spikes, or unknown spike notional
- command: python scripts\task.py volume-spike-calibration --from <started_at> --to <ended_at> --limit 0 --venue kalshi --min-trade-usd 1000 --format json
  why: optional diagnostic comparison for showing whether a 1000 USD floor would cut into the 800-999 USD reviewed true-positive risk band
advancement_policy:
  default: Work lower layers before higher layers when both are feasible.
  allowed_parallel_work: true
  allowed_top_down_spikes: true
  spike_payback_required: tests_or_schema_or_fixtures_or_interfaces_or_blocker
  never_bypass:
  - local_only_scope
  - no_trading_or_order_placement
  - raw_evidence_lineage
  - default_offline_verification
  - no_secret_commits
  - no_weakened_tests
  orthogonal_decisioning_for_unclear_work: true
  talmudic_style_debate_for_nontrivial_decisions: true
  anti_ceremony_material_results_over_process: true
  orthogonal_reasoning_allowed: true
  compact_decision_debate_required_for_unclear_architecture: true
  material_progress_over_ceremony: true
  decision_loop:
    when: unclear_architectural_or_organizational_or_orchestration_or_data_semantic_choice
    format: question_strongest_case_objection_orthogonal_alternative_consensus_payback_next_check
    max_default_length: short_enough_to_not_block_implementation
