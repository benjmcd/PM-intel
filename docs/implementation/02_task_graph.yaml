- command: python scripts\task.py soak --since <started_at> --until <ended_at>
  why: validate one exact bounded ingest run using explicit timestamps
- command: python scripts\task.py fixture-replay
  why: fixture-backed replay proof for raw-to-alert behavior
- command: python scripts\task.py health
  why: inspect local daemon heartbeat and stale/missing runtime state
- command: python scripts\task.py report --since 7d
  why: inspect local alert, review, and data-quality posture from Postgres
- command: python scripts\task.py dead-letters --limit 20 --format json
