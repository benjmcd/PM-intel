version: pmfi-dq3-recovery-manifest.v1
scenario_id: DQ-3
scenario_version: "0.1"
profile: offline_postgres_recovery_trial
run_key: DQ3-RECOVERY-V1
venue_code: polymarket
source_channel: dq3_recovery_trial_v1
checkpoint_feed_name: dq3_recovery_checkpoint
duplicate_burst_attempts: 5

required_facets:
  - POSTGRES_INTEGRATION
  - CONCURRENCY
  - FAULT_INJECTION
  - OPERATOR_DRILL

manual_deferred_facets:
  - facet: OPERATOR_DRILL
    reason: The offline DB-gated harness verifies the local command scaffold, but does not execute the pmfi operator commands against run-scoped recovered state.
  - facet: OPERATOR_DRILL_MANUAL_SLEEP_RESUME
    reason: Windows sleep/resume and a human recovery transcript require an operator-run drill outside this offline DB-gated harness.

kill_points:
  - after_raw_event_commit
  - after_canonical_fact_commit
  - before_metric_update
  - before_alert_persistence
  - before_cursor_checkpoint
  - after_cursor_checkpoint
  - processing_claim_held
  - before_optional_enrichment

expected_counts:
  accepted_unique_raw_events: 12
  accounted_unique_raw_events: 12
  normalized_trade_rows: 10
  dead_letter_rows: 2
  duplicate_canonical_facts: 0
  duplicate_metric_windows: 0
  duplicate_historical_alerts: 0
  poison_dead_letters: 1
  unsupported_concurrent_instances: 0

events:
  hard_kill_after_raw:
